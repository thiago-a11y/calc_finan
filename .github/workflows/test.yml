name: Testes Automatizados

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-backend:
    name: Backend (Python/FastAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Criar .env de teste
        run: |
          cat > .env << 'EOF'
          SYNERIUM_ENV=test
          JWT_SECRET_KEY=test-secret-key
          LANGSMITH_API_KEY=test
          LANGSMITH_TRACING=false
          CREWAI_TRACING_ENABLED=false
          OPENAI_API_KEY=sk-test-fake-key-for-ci
          ANTHROPIC_API_KEY=sk-ant-test-fake-key-for-ci
          LIVEKIT_API_KEY=test
          LIVEKIT_API_SECRET=test
          LIVEKIT_URL=wss://test.livekit.cloud
          EOF

      - name: Criar diretórios necessários
        run: mkdir -p logs data/chromadb data/uploads/chat data/propostas_edicao

      - name: Rodar testes unitários
        run: pytest tests/unit/ -v --tb=short -m unit

      - name: Rodar testes de integração
        run: pytest tests/integration/ -v --tb=short -m integration
        continue-on-error: true

      - name: Relatório de cobertura
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-report=html -m "unit or integration"
        continue-on-error: true
