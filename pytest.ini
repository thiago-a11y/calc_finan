[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Testes unitários (rápidos, sem dependência externa)
    integration: Testes de integração (API, banco de dados)
    e2e: Testes end-to-end (Playwright)
    slow: Testes lentos (chamadas externas, LLM)
asyncio_mode = auto
